<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Cohete Studio">
  <defs>
    <linearGradient id="grad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#C084FC"/>
      <stop offset="55%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C084FC" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Subtle gradient backdrop (very faint, gives the mark a soft container) -->
  <circle cx="100" cy="100" r="96" fill="url(#gradSoft)"/>

  <!-- Clean rocket silhouette: pointed nose, slim body, two angled fins, all one filled path -->
  <path fill="url(#grad)" d="
    M 100 26
    C 117 46, 124 72, 124 98
    L 124 132
    Q 140 138, 154 158
    Q 138 154, 124 153
    L 124 158
    Q 124 168, 117 172
    L 83 172
    Q 76 168, 76 158
    L 76 153
    Q 62 154, 46 158
    Q 60 138, 76 132
    L 76 98
    C 76 72, 83 46, 100 26
    Z
  "/>

  <!-- Single window: minimal accent -->
  <circle cx="100" cy="82" r="8" fill="#FFFFFF"/>
</svg>
