<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Cohete Studio">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#C084FC"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1"   stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="finGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <radialGradient id="flameGrad" cx="50%" cy="0%" r="100%">
      <stop offset="0"   stop-color="#FDE047"/>
      <stop offset="0.5" stop-color="#F97316"/>
      <stop offset="1"   stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="55%">
      <stop offset="0"   stop-color="#A855F7" stop-opacity="0.35"/>
      <stop offset="1"   stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft halo -->
  <circle cx="100" cy="100" r="98" fill="url(#halo)"/>

  <!-- rocket flame -->
  <path d="M88 150 L100 195 L112 150 C108 158, 92 158, 88 150 Z" fill="url(#flameGrad)" opacity="0.95"/>

  <!-- rocket body -->
  <path d="M100 12 C 130 50, 130 110, 130 150 L 70 150 C 70 110, 70 50, 100 12 Z" fill="url(#bodyGrad)"/>

  <!-- rocket window -->
  <circle cx="100" cy="70"  r="14" fill="#0A0A14"/>
  <circle cx="100" cy="70"  r="10" fill="#22D3EE" opacity="0.85"/>
  <circle cx="96"  cy="66"  r="3"  fill="#FBF8F2" opacity="0.7"/>

  <!-- belt -->
  <rect x="70" y="105" width="60" height="6" fill="#0A0A14"/>

  <!-- left fin -->
  <path d="M70 110 L 50 150 L 70 150 Z" fill="url(#finGrad)"/>
  <!-- right fin -->
  <path d="M130 110 L 150 150 L 130 150 Z" fill="url(#finGrad)"/>

  <!-- stars -->
  <g fill="#FBF8F2" opacity="0.9">
    <circle cx="40"  cy="30"  r="1.6"/>
    <circle cx="170" cy="40"  r="1.2"/>
    <circle cx="30"  cy="90"  r="1"/>
    <circle cx="175" cy="120" r="1.6"/>
    <circle cx="160" cy="170" r="1.2"/>
    <circle cx="35"  cy="170" r="1"/>
  </g>
</svg>
